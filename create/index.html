<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DNS Profile | Create</title>
    <style>
        body{
            background-color: #272b44;
            color: #FFFFFF;
            text-align: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }


.button-19 {
  appearance: button;
  background-color: #1899D6;
  border: solid transparent;
  border-radius: 16px;
  border-width: 0 0 4px;
  box-sizing: border-box;
  color: #FFFFFF;
  cursor: pointer;
  display: inline-block;
  font-family: din-round,sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .8px;
  line-height: 20px;
  margin: 0;
  outline: none;
  overflow: visible;
  padding: 13px 16px;
  text-align: center;
  text-transform: uppercase;
  touch-action: manipulation;
  transform: translateZ(0);
  transition: filter .2s;
  user-select: none;
  -webkit-user-select: none;
  vertical-align: middle;
  white-space: nowrap;
  width: 90%;
}

.button-18 {
  appearance: button;
  background-color: #1899D6;
  border: solid transparent;
  border-radius: 16px;
  border-width: 0 0 4px;
  box-sizing: border-box;
  color: #FFFFFF;
  cursor: pointer;
  display: inline-block;
  font-family: din-round,sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .8px;
  line-height: 20px;
  margin: 0;
  outline: none;
  overflow: visible;
  padding: 13px 16px;
  text-align: center;
  text-transform: uppercase;
  touch-action: manipulation;
  transform: translateZ(0);
  transition: filter .2s;
  user-select: none;
  -webkit-user-select: none;
  vertical-align: middle;
  white-space: nowrap;
  width: 40%;
}

.button-18:after {
  background-clip: padding-box;
  background-color: #1CB0F6;
  border: solid transparent;
  border-radius: 16px;
  border-width: 0 0 4px;
  bottom: -4px;
  content: "";
  left: 0;
  position: absolute;
  right: 0;
  top: 0;
  z-index: -1;
}

.button-18,
.button-18:focus {
  user-select: auto;
}

.button-18:hover:not(:disabled) {
  filter: brightness(1.1);
  -webkit-filter: brightness(1.1);
}

.button-18:disabled {
  cursor: auto;
}

.button-18:active {
  border-width: 4px 0 0;
  background: none;
}

.button-19:after {
  background-clip: padding-box;
  background-color: #1CB0F6;
  border: solid transparent;
  border-radius: 16px;
  border-width: 0 0 4px;
  bottom: -4px;
  content: "";
  left: 0;
  position: absolute;
  right: 0;
  top: 0;
  z-index: -1;
}

.button-19,
.button-19:focus {
  user-select: auto;
}

.button-19:hover:not(:disabled) {
  filter: brightness(1.1);
  -webkit-filter: brightness(1.1);
}

.button-19:disabled {
  cursor: auto;
}

.button-19:active {
  border-width: 4px 0 0;
  background: none;
}

.btn-pos {
    position: relative;
    top: 40vh;
}

.hidden {
    visibility:hidden;
}
.visible{
    visibility:visible;
}

.checkbox {
    width:18px;
    height:18px;
}

        
    </style>
    
</head>
<body>
    <h2>Simple Profile Creator</h2>
    <br>
    <span>Profile Name: </span><input id="pna" style="width: 20vw;" placeholder="IPA Anti-Revoke"></input>
    <br>
    <br>
    <span>DNS URL (Must be DOH): </span><input id="durl" style="width: 20vw;" placeholder="DNS over HTTPS"></input>
    <br>
    <br>
    <span>Use Web Clip: </span><input id="chk" class="checkbox" type="checkbox"></input>
    <br>
    <br>
    <span class="work hidden">WebClip URL: </span><input id="wurl" style="width: 20vw;" checked="0" class="work hidden" placeholder="https://example.com"></input>
    <br>
    <br>
    <span class="work hidden">WebClip Name: </span><input id="wna" style="width: 20vw;" checked="0" class="work hidden" placeholder="Web Clip"></input>
    <br>
    <br>
    <span class="work hidden">Removable Webclip: </span><input id="chk2" class="work hidden checkbox" checked="1" type="checkbox"></input>
    <br>
    <br>
    <span class="work hidden">Icon (180x180, 512x512): </span><input id="iconfile" class="work hidden" accept="image/png" type="file"></input>
    <br>
    <br>
    <br>
    <br>
    <button id="ps" class="button-19">Create DNS Profile</button>
    <br>
    <br>
    <br>
    <h3 id="status"></h3>
    <script>
        var chk=document.getElementById("chk")
        var chk2=document.getElementById("chk2")
        var create=document.getElementById("ps")

        var wurl=document.getElementById("wurl")
        var durl=document.getElementById("durl")
        var pna=document.getElementById("pna")
        var wna=document.getElementById("wna")

        var statuss=document.getElementById("status")

        var files=document.getElementById("iconfile")
        var webp=document.getElementsByClassName("work")
        var imageb64=""
        var webclipon=false
        var removableon=true

        chk.addEventListener("input", function(ev){
            webclipon=!webclipon
            for (let index = 0; index < webp.length; index++) {
                const element = webp[index];
                element.classList.toggle("hidden")
            }
        })
        chk2.addEventListener("input", function(ev){
            removableon=!removableon
        })

        files.addEventListener("change",function(){
            var file=this.files[0]
            var reader=new FileReader()

            reader.onloadend = () => {
                imageb64 = reader.result.split(',')[1]
                console.log(imageb64)
            }

            if (file) reader.readAsDataURL(file)
        })

        var plist=""

        function downloadProfile(input,name){
            var b=new Blob([input],{type:"application/x-apple-aspen-config"})

            var a=document.createElement('a')

            a.href=URL.createObjectURL(b)
            a.download=name

            document.body.appendChild(a)
            a.click()
            URL.revokeObjectURL(a.href)
            document.body.removeChild(a)
        }
        
        create.addEventListener("click",function(){
            if (durl.value.trim()===""||pna.value.trim()==="") {
                console.log("test")
                return statuss.innerText="Please fill out the dns settings."
            }else{statuss.innerText=""}
            if (webclipon) {
                if (wurl.value.trim()!==""&&wna.value.trim()!==""&&imageb64!==""){
                    plist=`<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>

	<key>PayloadDisplayName</key>
	<string>
        ${pna.value.trim()}
    </string>

	<key>PayloadIdentifier</key>
	<string>
        pl.kacpero12.generated.profile.${crypto.randomUUID()}
    </string>

	<key>PayloadType</key>
	<string>Configuration</string>

	<key>PayloadUUID</key>
	<string>
        ${crypto.randomUUID()}
    </string>

	<key>PayloadVersion</key>
	<integer>1</integer>

	<key>PayloadContent</key>
	<array>

		<dict>
            <key>PayloadDisplayName</key>
            <string>DNS</string>
			<key>PayloadIdentifier</key>
			<string>
                pl.kacpero12.generated.dns.
            </string>

			<key>PayloadType</key>
			<string>com.apple.dnsSettings.managed</string>

			<key>PayloadUUID</key>
			<string>
                ${crypto.randomUUID()}
            </string>

			<key>PayloadVersion</key>
			<integer>1</integer>

			<key>DNSSettings</key>
			<dict>
				<key>DNSProtocol</key>
				<string>HTTPS</string>

				<key>ServerURL</key>
				<string>
                    ${durl.value.trim()}
                </string>
			</dict>
		</dict>

		<dict>
            <key>PayloadDisplayName</key>
            <string>
                ${wna.value.trim()}
            </string>
			<key>FullScreen</key>
			<true/>

			<key>IsRemovable</key>
			<${removableon}/>


			<key>PayloadIdentifier</key>
			<string>
                pl.kacpero12.webclips.${crypto.randomUUID()}
            </string>

            <key>Label</key>
			<string>
                ${wna.value.trim()}
            </string>

			<key>PayloadType</key>
			<string>com.apple.webClip.managed</string>


			<key>PayloadUUID</key>
			<string>
                ${crypto.randomUUID()}
            </string>

			<key>PayloadVersion</key>
			<integer>1</integer>

			<key>URL</key>
			<string>
                ${wurl.value.trim()}
            </string>

			<key>Icon</key>
			<data>
                ${imageb64}
			</data>

			<key>Precomposed</key>
			<true/>
		</dict>

	</array>
</dict>
</plist>`
                    downloadProfile(plist,`${pna.value.trim()}.mobileconfig`)
                } else {
                    statuss.innerText="Please fill out the webclip settings."
                }
            } else {
                plist=`<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>

	<key>PayloadDisplayName</key>
	<string>
        ${pna.value.trim()}
    </string>

	<key>PayloadIdentifier</key>
	<string>
        pl.kacpero12.generated.profile.${crypto.randomUUID()}
    </string>

	<key>PayloadType</key>
	<string>Configuration</string>

	<key>PayloadUUID</key>
	<string>
        ${crypto.randomUUID()}
    </string>

	<key>PayloadVersion</key>
	<integer>1</integer>

	<key>PayloadContent</key>
	<array>

		<dict>
            <key>PayloadDisplayName</key>
            <string>DNS</string>
			<key>PayloadIdentifier</key>
			<string>
                pl.kacpero12.generated.dns.
            </string>

			<key>PayloadType</key>
			<string>com.apple.dnsSettings.managed</string>

			<key>PayloadUUID</key>
			<string>
                ${crypto.randomUUID()}
            </string>

			<key>PayloadVersion</key>
			<integer>1</integer>

			<key>DNSSettings</key>
			<dict>
				<key>DNSProtocol</key>
				<string>HTTPS</string>

				<key>ServerURL</key>
				<string>
                    ${durl.value.trim()}
                </string>
			</dict>
		</dict>

	</array>
</dict>
</plist>`
            }
        })

    </script>
</body>
</html>
